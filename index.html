// ===== GHI ÂM =====
async function toggleRecording() {
    let recordBtn = document.getElementById("record-btn");
    let feedbackArea = document.getElementById("feedback-area");
    let aiCorrection = document.getElementById("ai-correction");
    if (!isRecording) {
        audioChunks = [];
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        isRecording = true;
        recordBtn.innerHTML = "🛑 Stopp";
        feedbackArea.style.display = "block";
        aiCorrection.style.display = "none";
        document.getElementById("transcript-text").innerHTML = "<i>Kapi hört zu... 🦫🎤</i>";
    } else {
        mediaRecorder.stop();
        isRecording = false;
        recordBtn.innerHTML = "🎤 Aufnehmen";
        document.getElementById("transcript-text").innerHTML = "<i>Kapi denkt nach... 🧠</i>";
        mediaRecorder.onstop = async () => {
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'audio.webm');
            aiCorrection.innerHTML = "<p style='color:#0984e3;'><i>Kapi đang nghe und suy nghĩ... 🧠🦫</i></p>";
            aiCorrection.style.display = "block";
            try {
                const transcribeRes = await fetch('/api/transcribe', { method: 'POST', body: formData });
                const transcribeData = await transcribeRes.json();
                const text = transcribeData.text;
                if (!text || !text.trim()) {
                    document.getElementById("transcript-text").innerHTML = "<b>Oops!</b>";
                    aiCorrection.innerHTML = "<p style='color:red;'>Ich habe nichts gehört.</p>";
                    return;
                }
                document.getElementById("transcript-text").innerHTML = "<b>Du sagst:</b> " + text;
                const chatRes = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const chatData = await chatRes.json();
                aiCorrection.innerHTML = chatData.result || "<p style='color:red;'>" + (chatData.error || "Lỗi") + "</p>";
            } catch (error) {
                aiCorrection.innerHTML = "<p style='color:red;'>Lỗi: " + error.message + "</p>";
            }
        };
    }
}

// ===== TIMER =====
function startTimer() {
    clearInterval(countdown);
    let time = 120;
    countdown = setInterval(function() {
        let m = Math.floor(time / 60);
        let s = time % 60;
        document.getElementById("timer").innerText = m + ":" + s.toString().padStart(2, "0");
        time--;
        if (time < 0) { clearInterval(countdown); document.getElementById("timer").innerText = "⏰ Zeit ist um!"; }
    }, 1000);
}

        <button onclick="goHome()" style="font-size:20px;padding:10px 20px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#eee;">🏠 Zurück</button>

}

function goHome() {

function showVokabelGruppe(gruppe) {
    currentGruppe = gruppe;
    currentVokabelIndex = 0;
    showVokabel();
}

function showVokabel() {
    const gruppe = vokabelGruppen[currentGruppe];
    const wort = gruppe.woerter[currentVokabelIndex];
    const total = gruppe.woerter.length;
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = `
        <span style="font-size:16px;color:#666;">${gruppe.titel} | ${currentVokabelIndex + 1}/${total}</span><br><br>
        <img src="${wort.bild}" alt="${wort.de}" style="width:200px;height:200px;object-fit:contain;border-radius:12px;margin:10px;" onerror="this.onerror=null; this.src='https://placehold.co/250x180/e3f2fd/1565c0?text=Bild+fehlt'"><br>
        <b style="font-size:26px;">${wort.de}</b><br>
        <span style="font-size:22px;color:#555;">${wort.vi}</span>
    `;
    const prevBtn = currentVokabelIndex > 0 ? `<button onclick="prevVokabel()" style="font-size:20px;padding:12px 22px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#eee;">⬅️ Trước</button>` : '';
    const nextBtn = currentVokabelIndex < total - 1
        ? `<button onclick="nextVokabel()" style="font-size:20px;padding:12px 22px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#4CAF50;color:white;">➡️ Tiếp</button>`
        : `<button onclick="startMinigame()" style="font-size:20px;padding:12px 22px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#ff9800;color:white;">🎮 Minigame!</button>`;
    document.getElementById("buttons").innerHTML = `
        ${prevBtn}
        ${nextBtn}
        <button onclick="showMedizinMenu()" style="font-size:18px;padding:10px 20px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#eee;">🏠 Menu</button>
    `;
}

function nextVokabel() { currentVokabelIndex++; showVokabel(); }
function prevVokabel() { currentVokabelIndex--; showVokabel(); }

// ===== MINIGAME =====
function startMinigame() {
    const gruppe = vokabelGruppen[currentGruppe];
    minigameScore = 0;
    minigameIndex = 0;
    minigameQuestions = [...gruppe.woerter].sort(() => Math.random() - 0.5);
    showMinigameQuestion();
}

function showMinigameQuestion() {
    const gruppe = vokabelGruppen[currentGruppe];
    if (minigameIndex >= minigameQuestions.length) { showMinigameResult(); return; }
    const current = minigameQuestions[minigameIndex];
    let wrongAnswers = gruppe.woerter.filter(w => w.de !== current.de).sort(() => Math.random() - 0.5).slice(0, 3);
    let answers = [...wrongAnswers, current].sort(() => Math.random() - 0.5);
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = `
        <span style="font-size:16px;color:#666;">🎮 Minigame | Câu ${minigameIndex + 1}/${minigameQuestions.length} | Điểm: ${minigameScore}</span><br><br>
        <img src="${current.bild}" alt="${current.de}" style="width:200px;height:200px;object-fit:contain;border-radius:12px;margin:10px;" onerror="this.onerror=null; this.src='https://placehold.co/250x180/e3f2fd/1565c0?text=?'"><br>
        <b>Đây là gì? / Was ist das?</b>
    `;
    document.getElementById("buttons").innerHTML = answers.map(a => `
        <button onclick="checkMinigame('${encodeURIComponent(a.de)}', '${encodeURIComponent(current.de)}', '${encodeURIComponent(current.vi)}')" style="font-size:18px;padding:12px 20px;margin:8px;border-radius:15px;border:2px solid #ddd;cursor:pointer;display:block;width:90%;max-width:500px;text-align:left;">
            ${a.de}
        </button>
    `).join('');
}

function checkMinigame(chosenEncoded, correctEncoded, viEncoded) {
    const chosen = decodeURIComponent(chosenEncoded);
    const correct = decodeURIComponent(correctEncoded);
    const vi = decodeURIComponent(viEncoded);
    const isCorrect = chosen === correct;
    if (isCorrect) minigameScore++;
    const feedbackArea = document.getElementById("feedback-area");
    const aiCorrection = document.getElementById("ai-correction");
    feedbackArea.style.display = "block";
    aiCorrection.style.display = "block";
    aiCorrection.innerHTML = `
        <p style="font-size:22px;">${isCorrect ? "✅ Richtig! / Đúng rồi!" : "❌ Falsch! / Sai rồi!"}</p>
        ${!isCorrect ? `<p style="font-size:18px;color:green;">✔️ Đáp án đúng: <b>${correct}</b></p>` : ""}
        <p style="font-size:16px;">${correct} = ${vi}</p>
        <button onclick="nextMinigame()" style="font-size:20px;padding:10px 25px;border-radius:15px;border:none;cursor:pointer;background:#4CAF50;color:white;margin-top:10px;">
            ${minigameIndex + 1 >= minigameQuestions.length ? "🏆 Kết quả" : "➡️ Tiếp"}
        </button>
    `;
}

function nextMinigame() {
    minigameIndex++;
    document.getElementById("feedback-area").style.display = "none";
    showMinigameQuestion();
}

function showMinigameResult() {
    const total = minigameQuestions.length;
    const percent = Math.round((minigameScore / total) * 100);
    const emoji = percent >= 80 ? "🏆" : percent >= 60 ? "👍" : "💪";
    document.getElementById("message").innerHTML = `
        ${emoji} <b>Kết quả Minigame!</b><br><br>
        ${minigameScore}/${total} (${percent}%)<br><br>
        ${percent >= 80 ? "Ausgezeichnet! 🌟" : percent >= 60 ? "Gut gemacht! 👏" : "Weiter üben! 💪"}
    `;
    document.getElementById("buttons").innerHTML = `
        <button onclick="startMinigame()" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#ff9800;color:white;">🔄 Nochmal</button>
        <button onclick="showVokabelGruppe(currentGruppe)" style="font-size:20px;padding:12px 22px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#e3f2fd;">📖 Ôn lại từ</button>
        <button onclick="showMedizinMenu()" style="font-size:18px;padding:10px 20px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#eee;">⬅️ Menu</button>
    `;
    document.getElementById("feedback-area").style.display = "none";
}

    {type:"bedeutung",frage:"Was bedeutet 'Infekte'?",antworten:["nhiễm trùng / Infektionskrankheiten","thuốc kháng sinh / Antibiotika","vết thương / Wunden","dị ứng / Allergien"],richtig:0,erklaerung:"Infekte = nhiễm trùng / Krankheiten, die durch Viren oder Bakterien verursacht werden."},
    {type:"luecke",frage:"Die ___ der Wunde muss sofort nach dem Unfall erfolgen.",antworten:["Behandlung","Abwehr","Betreuung","Maßnahme"],richtig:0,erklaerung:"Behandlung = điều trị / Die medizinische Versorgung einer Verletzung oder Krankheit."},
    {type:"wahl",frage:"Welches Wort passt? Traditionelle ___ wie Botox sind heute sehr beliebt.",antworten:["Schönheitsbehandlungen","Hausmittel","Impfstoffe","Maßnahmen"],richtig:0,erklaerung:"Schönheitsbehandlungen = liệu pháp làm đẹp / Kosmetische Eingriffe zur Verbesserung des Aussehens."},
    {type:"bedeutung",frage:"Was bedeutet 'Abwehr' im medizinischen Kontext?",antworten:["sức đề kháng / Widerstand gegen Krankheiten","điều trị / Behandlung","chẩn đoán / Diagnose","phục hồi / Erholung"],richtig:0,erklaerung:"Abwehr = sức đề kháng / Die Fähigkeit des Körpers, sich gegen Krankheitserreger zu wehren."},
    {type:"luecke",frage:"Für eine ___ braucht man täglich ausreichend Schlaf und gesunde Ernährung.",antworten:["faltenfreie Haut","nährstoffarme Ernährung","starke Heiserkeit","schnelle Behandlung"],richtig:0,erklaerung:"Faltenfreie Haut = da không nếp nhăn / Haut ohne Falten, oft ein Zeichen von Jugendlichkeit."},
    {type:"wahl",frage:"Welches Wort passt? Die traditionelle ___ zwischen Mann und Frau verändert sich in der modernen Gesellschaft.",antworten:["Geschlechterrolle","Betreuung","Maßnahme","Abwehr"],richtig:0,erklaerung:"Geschlechterrolle = vai trò giới tính / Die gesellschaftlich erwarteten Verhaltensweisen für Männer und Frauen."},
    {type:"bedeutung",frage:"Was bedeutet 'effektiv'?",antworten:["hiệu quả / wirksam","đắt tiền / teuer","khó khăn / schwierig","an toàn / sicher"],richtig:0,erklaerung:"Effektiv = hiệu quả / Etwas, das das gewünschte Ergebnis erzielt."},
    {type:"luecke",frage:"Eine ___ Nase und Niesen sind typische Symptome einer Erkältung.",antworten:["Schnupf-","heisere","juckende","infizierte"],richtig:0,erklaerung:"Schnupfnase = mũi bị sổ / Eine laufende oder verstopfte Nase bei Erkältung."}
];

function startMedizin() {
    score = 0;
    currentQuestionIndex = 0;
    questionHistory = [];
    shuffledQuestions = [...medizinQuestions].sort(() => Math.random() - 0.5);
    showQuestion();
}

function showQuestion() {
    if (currentQuestionIndex >= shuffledQuestions.length) { showResult(); return; }
    const q = shuffledQuestions[currentQuestionIndex];
    const typeLabel = q.type === "luecke" ? "🔤 Điền vào chỗ trống" : q.type === "bedeutung" ? "📚 Chọn nghĩa đúng" : "✏️ Chọn từ đúng";
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = `
        <span style="font-size:16px;color:#666;">${typeLabel} | Câu ${currentQuestionIndex + 1}/${shuffledQuestions.length} | Điểm: ${score}</span><br><br>
        <b>${q.frage}</b>
    `;
    const shuffledAnswers = q.antworten.map((a, i) => ({text: a, original: i})).sort(() => Math.random() - 0.5);
    const labels = ["A", "B", "C", "D"];
    const backBtn = currentQuestionIndex > 0 ? `<button onclick="prevQuestion()" style="font-size:18px;padding:10px 20px;margin:8px;border-radius:15px;border:2px solid #ddd;cursor:pointer;background:#eee;">⬅️ Câu trước</button>` : '';
    document.getElementById("buttons").innerHTML = shuffledAnswers.map((a, i) => `
        <button onclick="checkAnswer(${a.original}, ${q.richtig}, '${encodeURIComponent(q.erklaerung)}', '${encodeURIComponent(q.antworten[q.richtig])}')" style="font-size:18px;padding:12px 20px;margin:8px;border-radius:15px;border:2px solid #ddd;cursor:pointer;display:block;width:90%;max-width:600px;text-align:left;">
            <b>${labels[i]}.</b> ${a.text}
        </button>
    `).join('') + backBtn + `<button onclick="showMedizinMenu()" style="font-size:18px;padding:10px 20px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#eee;">🏠 Menu</button>`;
}

function prevQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        if (questionHistory.length > 0) {
            score = questionHistory[questionHistory.length - 1].score;
            questionHistory.pop();
        }
        showQuestion();
    }
}

function checkAnswer(chosen, correct, erklaerungEncoded, correctAnswerEncoded) {
    const erklaerung = decodeURIComponent(erklaerungEncoded);
    const correctAnswer = decodeURIComponent(correctAnswerEncoded);
    const isCorrect = chosen === correct;
    questionHistory.push({ index: currentQuestionIndex, score: score });
    if (isCorrect) score++;
    const feedbackArea = document.getElementById("feedback-area");
    const aiCorrection = document.getElementById("ai-correction");
    feedbackArea.style.display = "block";
    aiCorrection.style.display = "block";
    aiCorrection.innerHTML = `
        <p style="font-size:22px;">${isCorrect ? "✅ Richtig! / Đúng rồi!" : "❌ Falsch! / Sai rồi!"}</p>
        ${!isCorrect ? `<p style="font-size:18px;color:green;">✔️ Đáp án đúng: <b>${correctAnswer}</b></p>` : ""}
        <p style="font-size:16px;background:#f0f0f0;padding:10px;border-radius:8px;">${erklaerung}</p>
        <button onclick="nextQuestion()" style="font-size:20px;padding:10px 25px;border-radius:15px;border:none;cursor:pointer;background:#4CAF50;color:white;margin-top:10px;">
            ${currentQuestionIndex + 1 >= shuffledQuestions.length ? "🏆 Ergebnis sehen" : "➡️ Nächste Frage"}
        </button>
    `;
}

function nextQuestion() {
    currentQuestionIndex++;
    document.getElementById("feedback-area").style.display = "none";
    showQuestion();
}

function showResult() {
    const percent = Math.round((score / shuffledQuestions.length) * 100);
    const emoji = percent >= 80 ? "🏆" : percent >= 60 ? "👍" : "💪";
    document.getElementById("message").innerHTML = `
        ${emoji} <b>Ergebnis / Kết quả</b><br><br>
        ${score}/${shuffledQuestions.length} Punkte (${percent}%)<br><br>
        ${percent >= 80 ? "Ausgezeichnet! Sehr gut gemacht! 🌟" : percent >= 60 ? "Gut gemacht! Weiter so! 👏" : "Nicht aufgeben! Übung macht den Meister! 💪"}
    `;
    document.getElementById("buttons").innerHTML = `
        <button onclick="startMedizin()" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#e8f5e9;">🔄 Nochmal / Thử lại</button>
        <button onclick="showMedizinMenu()" style="font-size:20px;padding:10px 20px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#eee;">⬅️ Zurück</button>
    `;
    document.getElementById("feedback-area").style.display = "none";
}
</script>
