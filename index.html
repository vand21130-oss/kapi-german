// ===== NHẬN DIỆN GIỌNG NÓI NATIVE (THAY THẾ API SERVER) =====
let recognition = null;
window.lastSpokenText = "";

if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'de-DE';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
        let final_transcript = '';
        let interim_transcript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                final_transcript += event.results[i][0].transcript + ' ';
            } else {
                interim_transcript += event.results[i][0].transcript;
            }
        }
        window.lastSpokenText += final_transcript;
        document.getElementById("transcript-text").innerHTML = "<b>" + window.lastSpokenText + "</b> <i style='color:#999'>" + interim_transcript + "</i>";
    };
    
    recognition.onerror = (e) => {
        console.log("Lỗi microphone: ", e);
    };
}

function toggleRecording() {
    let recordBtn = document.getElementById("record-btn");
    let feedbackArea = document.getElementById("feedback-area");
    let aiCorrection = document.getElementById("ai-correction");
    
    if (!recognition) {
        alert("Trình duyệt không hỗ trợ ghi âm. Hãy dùng Google Chrome trên máy tính nhé Vịt!");
        return;
    }

    if (!isRecording) {
        window.lastSpokenText = ""; // Reset
        recognition.start();
        isRecording = true;
        recordBtn.innerHTML = "🛑 Stopp";
        recordBtn.style.backgroundColor = "#e74c3c";
        recordBtn.style.color = "white";
        feedbackArea.style.display = "block";
        aiCorrection.style.display = "none";
        document.getElementById("transcript-text").innerHTML = "<i>Kapi hört zu... 🦫🎤 (Nói đi Vịt!)</i>";
    } else {
        recognition.stop();
        isRecording = false;
        recordBtn.innerHTML = "🎤 Aufnehmen";
        recordBtn.style.backgroundColor = "#e2e8f0";
        recordBtn.style.color = "black";
        
        if (window.lastSpokenText.trim() !== "") {
            aiCorrection.style.display = "block";
            aiCorrection.innerHTML = `
                <button onclick="checkGrammarLT(window.lastSpokenText)" style="font-size:18px;padding:10px 20px;border-radius:12px;background:#3498db;color:white;border:none;cursor:pointer;">🔍 Kiểm tra ngữ pháp đoạn vừa nói</button>
                <div id="lt-result" style="margin-top:15px;font-size:18px;"></div>
            `;
        }
    }
}

// ===== KIỂM TRA NGỮ PHÁP LANGUAGE TOOL PUBLIC API =====
async function checkGrammarLT(textToCheck) {
    let container = document.getElementById("lt-result") || document.getElementById("ai-correction");
    container.style.display = "block";
    container.innerHTML = "<i>Kapi đang soi lỗi mạo từ và tính từ... 🦫🔍</i>";
    
    try {
        const response = await fetch('https://api.languagetool.org/v2/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ text: textToCheck, language: 'de-DE' })
        });
        const data = await response.json();
        
        if (data.matches.length === 0) {
            container.innerHTML = `<p style="color:#2ecc71;">✅ Wunderbar! Câu của cậu chuẩn xác về mặt mạo từ, đuôi tính từ và chính tả cơ bản.</p>`;
        } else {
            let html = `<ul style="text-align:left; color:#e74c3c;">`;
            data.matches.forEach(m => {
                let suggestions = m.replacements.slice(0, 3).map(r => r.value).join(" <b>hoặc</b> ");
                html += `<li style="margin-bottom:10px;"><b>Lỗi:</b> ${m.message} <br>${suggestions ? `<span style="color:#27ae60">💡 Gợi ý: <b>${suggestions}</b></span>` : ''}</li>`;
            });
            html += `</ul>`;
            container.innerHTML = html;
        }
    } catch(e) {
        container.innerHTML = `<p style="color:red;">Lỗi kết nối máy chủ kiểm tra!</p>`;
    }
}

function startTimer() {
    clearInterval(countdown);
    let time = 120;
    countdown = setInterval(function() {
        let m = Math.floor(time / 60);
        let s = time % 60;
        document.getElementById("timer").innerText = m + ":" + s.toString().padStart(2, "0");
        time--;
        if (time < 0) { clearInterval(countdown); document.getElementById("timer").innerText = "⏰ Zeit ist um!"; }
    }, 1000);
}

            <button onclick="showVokabelGruppe('technologie')" style="font-size:17px;padding:12px 16px;border-radius:15px;border:none;cursor:pointer;background:#f3e5f5;text-align:left;">💻 Technologie</button>
            <button onclick="showVokabelGruppe('gesellschaft')" style="font-size:17px;padding:12px 16px;border-radius:15px;border:none;cursor:pointer;background:#e8eaf6;text-align:left;">🏘️ Gesellschaft</button>
            <button onclick="showVokabelGruppe('studium')" style="font-size:17px;padding:12px 16px;border-radius:15px;border:none;cursor:pointer;background:#fff3e0;text-align:left;">🎓 Studium</button>
            <button onclick="showVokabelGruppe('saetze')" style="font-size:17px;padding:12px 16px;border-radius:15px;border:none;cursor:pointer;background:#e0f7fa;text-align:left;">💬 Sätze</button>
        </div>
        
        <div style="margin-top: 20px; max-width:600px; margin-left:auto; margin-right:auto;">
            <hr style="border:1px solid #eee; margin-bottom:15px;">
            <button onclick="startTypingPractice()" style="font-size:20px;padding:15px 20px;border-radius:15px;border:none;cursor:pointer;background:#ffb74d;color:white;width:100%;box-shadow: 0 4px 6px rgba(0,0,0,0.1);">✍️ Đặt câu với Kapi (Kiểm tra Ngữ pháp)</button>
        </div>

        <button onclick="showVokabelHauptmenu()" style="font-size:18px;padding:10px 20px;margin:15px 10px 5px;border-radius:20px;border:none;cursor:pointer;background:#eee;">⬅️ Zurück</button>
    `;
}

function showVokabelGruppe(gruppe) {
    if (!vokabelGruppen[gruppe] || !vokabelGruppen[gruppe].woerter.length) {
        alert("Chủ đề này chưa có từ vựng!"); return;
    }
    currentGruppe = gruppe;
    currentVokabelIndex = 0;
    currentShuffledWoerter = [...vokabelGruppen[gruppe].woerter].sort(() => Math.random() - 0.5);
    showVokabel();
}

function showVokabel() {
    const gruppeTitel = vokabelGruppen[currentGruppe].titel;
    const wort = currentShuffledWoerter[currentVokabelIndex];
    const total = currentShuffledWoerter.length;
    const isMedizin = ['diagnostik','verbandmaterial','krankheiten'].includes(currentGruppe);
    const backMenuFn = isMedizin ? "showMedizinMenu()" : "showAlltagMenu()";
    
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = `
        <span style="font-size:16px;color:#666;">${gruppeTitel} | ${currentVokabelIndex + 1}/${total}</span><br><br>
        <img src="${wort.bild}" alt="${wort.de}" style="width:200px;height:200px;object-fit:contain;border-radius:12px;margin:10px;" onerror="this.onerror=null;this.src='https://placehold.co/200x200/e3f2fd/1565c0?text=Bild'"><br>
        <b style="font-size:26px;">${wort.de}</b><br>
        <span style="font-size:22px;color:#555;">${wort.vi}</span><br>
        ${wort.beispiel ? `<div style="margin-top:12px;padding:10px 16px;background:#f9f9f9;border-radius:10px;font-size:17px;color:#444;font-style:italic;max-width:500px;display:inline-block;text-align:left;">📝 <b>Beispiel:</b> ${wort.beispiel}</div>` : ''}
    `;
    
    const prevBtn = currentVokabelIndex > 0 ? `<button onclick="prevVokabel()" style="font-size:20px;padding:12px 22px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#eee;">⬅️ Trước</button>` : '';
    const nextBtn = currentVokabelIndex < total - 1
        ? `<button onclick="nextVokabel()" style="font-size:20px;padding:12px 22px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#4CAF50;color:white;">➡️ Tiếp</button>`
        : `<button onclick="startMinigame()" style="font-size:20px;padding:12px 22px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#ff9800;color:white;">🎮 Minigame!</button>`;
        
    document.getElementById("buttons").innerHTML = `
        ${prevBtn}${nextBtn}
        <button onclick="${backMenuFn}" style="font-size:18px;padding:10px 20px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#eee;">🏠 Menu</button>
    `;
}

function nextVokabel() { currentVokabelIndex++; showVokabel(); }
function prevVokabel() { currentVokabelIndex--; showVokabel(); }

// ===== ĐẶT CÂU & CHẤM NGỮ PHÁP (LANGUAGE TOOL NATIVE) =====
function startTypingPractice() {
    document.getElementById("feedback-area").style.display = "none";
    let allWoerter = [];
    Object.values(vokabelGruppen).forEach(gruppe => {
        if(gruppe.woerter) allWoerter = allWoerter.concat(gruppe.woerter);
    });
    currentPracticeWord = allWoerter[Math.floor(Math.random() * allWoerter.length)];
    
    document.getElementById("message").innerHTML = `
        <div style="font-size:18px; color:#666; font-weight:normal;">Hãy đặt một câu tiếng Đức với từ này:</div>
        <div style="font-size:32px; color:#e67e22; margin:10px; font-weight:bold;">${currentPracticeWord.de}</div>
        <div style="font-size:20px; color:#555; margin-bottom:20px;">(${currentPracticeWord.vi})</div>
        <textarea id="userInput" rows="3" style="width:90%; max-width:600px; font-size:20px; padding:15px; border-radius:12px; border:2px solid #ccc; font-family:inherit;" placeholder="Nhập câu của cậu vào đây..."></textarea>
    `;
    
    document.getElementById("buttons").innerHTML = `
        <button onclick="checkGrammatikMitLT()" style="font-size:20px;padding:12px 25px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#4CAF50;color:white;box-shadow: 0 4px 6px rgba(0,0,0,0.1);">🚀 Kapi, chấm bài!</button>
        <button onclick="startTypingPractice()" style="font-size:18px;padding:12px 20px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#e3f2fd;">🔄 Đổi từ khác</button>
        <button onclick="showAlltagMenu()" style="font-size:18px;padding:10px 20px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#eee;">🏠 Menu</button>
    `;
}

async function checkGrammatikMitLT() {
    let userInput = document.getElementById("userInput").value.trim();
    let feedbackArea = document.getElementById("feedback-area");
    let aiCorrection = document.getElementById("ai-correction");
    
    if (!userInput) {
        alert("Cậu chưa viết gì kìa!"); return;
    }

    feedbackArea.style.display = "block";
    aiCorrection.style.display = "block";
    checkGrammarLT(userInput); // Gọi hàm LT đã viết ở trên
}

// ===== MINIGAME VÀ QUIZ =====
function startMinigame() {
    minigameScore = 0; minigameIndex = 0;
    minigameQuestions = [...currentShuffledWoerter].sort(() => Math.random() - 0.5);
    showMinigameQuestion();
}

function showMinigameQuestion() {
    if (minigameIndex >= minigameQuestions.length) { showMinigameResult(); return; }
    const current = minigameQuestions[minigameIndex];
    const allWoerter = vokabelGruppen[currentGruppe].woerter;
    const isMedizin = ['diagnostik','verbandmaterial','krankheiten'].includes(currentGruppe);
    const backMenuFn = isMedizin ? "showMedizinMenu()" : "showAlltagMenu()";
    
    let wrongAnswers = allWoerter.filter(w => w.de !== current.de).sort(() => Math.random() - 0.5).slice(0, 3);
    let answers = [...wrongAnswers, current].sort(() => Math.random() - 0.5);
    
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = `
        <span style="font-size:16px;color:#666;">🎮 Minigame | Câu ${minigameIndex + 1}/${minigameQuestions.length} | Điểm: ${minigameScore}</span><br><br>
        <img src="${current.bild}" alt="${current.de}" style="width:200px;height:200px;object-fit:contain;border-radius:12px;margin:10px;" onerror="this.onerror=null;this.src='https://placehold.co/200x200/e3f2fd/1565c0?text=?'"><br>
        <b style="font-size:22px;">Đây là gì? / Was ist das?</b>
    `;
    document.getElementById("buttons").innerHTML = answers.map(a => `
        <button onclick="checkMinigame('${encodeURIComponent(a.de)}','${encodeURIComponent(current.de)}','${encodeURIComponent(current.vi)}')"
            style="font-size:18px;padding:12px 20px;margin:8px;border-radius:15px;border:2px solid #ddd;cursor:pointer;display:block;width:90%;max-width:500px;text-align:left;background:white;">${a.de}</button>
    `).join('') + `<button onclick="${backMenuFn}" style="font-size:16px;padding:8px 18px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#eee;">🏠 Menu</button>`;
}

function checkMinigame(chosenEncoded, correctEncoded, viEncoded) {
    const chosen = decodeURIComponent(chosenEncoded);
    const correct = decodeURIComponent(correctEncoded);
    const vi = decodeURIComponent(viEncoded);
    const isCorrect = chosen === correct;
    if (isCorrect) minigameScore++;
    
    document.getElementById("feedback-area").style.display = "block";
    const aiCorrection = document.getElementById("ai-correction");
    aiCorrection.style.display = "block";
    aiCorrection.innerHTML = `
        <p style="font-size:22px; margin-top:0;">${isCorrect ? "✅ Richtig! / Đúng rồi!" : "❌ Falsch! / Sai rồi!"}</p>
        ${!isCorrect ? `<p style="font-size:18px;color:green;">✔️ Đáp án đúng: <b>${correct}</b></p>` : ""}
        <p style="font-size:16px;">${correct} = ${vi}</p>
        <button onclick="nextMinigame()" style="font-size:20px;padding:10px 25px;border-radius:15px;border:none;cursor:pointer;background:#4CAF50;color:white;margin-top:10px;">
            ${minigameIndex + 1 >= minigameQuestions.length ? "🏆 Kết quả" : "➡️ Tiếp"}
        </button>
    `;
}

function nextMinigame() {
    minigameIndex++;
    document.getElementById("feedback-area").style.display = "none";
    showMinigameQuestion();
}

function showMinigameResult() {
    const total = minigameQuestions.length;
    const percent = Math.round((minigameScore / total) * 100);
    const isMedizin = ['diagnostik','verbandmaterial','krankheiten'].includes(currentGruppe);
    const backMenuFn = isMedizin ? "showMedizinMenu()" : "showAlltagMenu()";
    
    document.getElementById("message").innerHTML = `
        <b>Kết quả Minigame!</b><br><br>${minigameScore}/${total} (${percent}%)<br><br>
    `;
    document.getElementById("buttons").innerHTML = `
        <button onclick="startMinigame()" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#ff9800;color:white;">🔄 Nochmal</button>
        <button onclick="${backMenuFn}" style="font-size:18px;padding:10px 20px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#eee;">⬅️ Menu</button>
    `;
    document.getElementById("feedback-area").style.display = "none";
}

function startMedizin() {
    score = 0; currentQuestionIndex = 0; questionHistory = [];
    shuffledQuestions = [...medizinQuestions].sort(() => Math.random() - 0.5);
    showQuestion();
}

function showQuestion() {
    if (currentQuestionIndex >= shuffledQuestions.length) { showResult(); return; }
    const q = shuffledQuestions[currentQuestionIndex];
    
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = `
        <span style="font-size:16px;color:#666;">Câu ${currentQuestionIndex + 1}/${shuffledQuestions.length} | Điểm: ${score}</span><br><br>
        <b>${q.frage}</b>
    `;
    
    const shuffledAnswers = q.antworten.map((a, i) => ({text: a, original: i})).sort(() => Math.random() - 0.5);
    const labels = ["A","B","C","D"];
    
    document.getElementById("buttons").innerHTML = shuffledAnswers.map((a, i) => `
        <button onclick="checkAnswer(${a.original},${q.richtig},'${encodeURIComponent(q.erklaerung)}','${encodeURIComponent(q.antworten[q.richtig])}')"
            style="font-size:18px;padding:12px 20px;margin:8px;border-radius:15px;border:2px solid #ddd;cursor:pointer;display:block;width:90%;max-width:600px;text-align:left;background:white;">
            <b>${labels[i]}.</b> ${a.text}
        </button>
    `).join('') + `<button onclick="showMedizinMenu()" style="font-size:18px;padding:10px 20px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#eee;">🏠 Menu</button>`;
}

function checkAnswer(chosen, correct, erklaerungEncoded, correctAnswerEncoded) {
    const erklaerung = decodeURIComponent(erklaerungEncoded);
    const correctAnswer = decodeURIComponent(correctAnswerEncoded);
    const isCorrect = chosen === correct;
    
    if (isCorrect) score++;
    
    document.getElementById("feedback-area").style.display = "block";
    const aiCorrection = document.getElementById("ai-correction");
    aiCorrection.style.display = "block";
    aiCorrection.innerHTML = `
        <p style="font-size:22px; margin-top:0;">${isCorrect ? "✅ Richtig! / Đúng rồi!" : "❌ Falsch! / Sai rồi!"}</p>
        ${!isCorrect ? `<p style="font-size:18px;color:green;">✔️ Đáp án đúng: <b>${correctAnswer}</b></p>` : ""}
        <p style="font-size:16px;background:#f0f0f0;padding:10px;border-radius:8px;">${erklaerung}</p>
        <button onclick="nextQuestion()" style="font-size:20px;padding:10px 25px;border-radius:15px;border:none;cursor:pointer;background:#4CAF50;color:white;margin-top:10px;">➡️ Tiếp</button>
    `;
}

function nextQuestion() {
    currentQuestionIndex++;
    document.getElementById("feedback-area").style.display = "none";
    showQuestion();
}

function showResult() {
    const percent = Math.round((score / shuffledQuestions.length) * 100);
    
    document.getElementById("message").innerHTML = `
        <b>Ergebnis / Kết quả</b><br><br>
        ${score}/${shuffledQuestions.length} Punkte (${percent}%)<br><br>
    `;
    document.getElementById("buttons").innerHTML = `
        <button onclick="startMedizin()" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#e8f5e9;">🔄 Nochmal</button>
        <button onclick="showMedizinMenu()" style="font-size:20px;padding:10px 20px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#eee;">⬅️ Zurück</button>
    `;
    document.getElementById("feedback-area").style.display = "none";
}
</script>
</body>
</html>
