// ===== PHẦN THÊM MỚI: LOGIC GHI ÂM VÀ SỬA LỖI =====
let recognition;
let isRecording = false;
let finalTranscript = "";

if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'de-DE'; // Nghe tiếng Đức

    recognition.onresult = function(event) {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript + ". ";
            } else {
                interimTranscript += event.results[i][0].transcript;
            }
        }
        document.getElementById("transcript-text").innerHTML = 
            "<b>Du sagst:</b> " + finalTranscript + "<i style='color:gray'>" + interimTranscript + "</i>";
    };
}

function toggleRecording() {
    let recordBtn = document.getElementById("record-btn");
    let feedbackArea = document.getElementById("feedback-area");
    let aiCorrection = document.getElementById("ai-correction");
    
    if (!isRecording) {
        finalTranscript = "";
        document.getElementById("transcript-text").innerHTML = "<i>Kapi hört zu... 🦫🎤</i>";
        aiCorrection.style.display = "none";
        feedbackArea.style.display = "block";
        
        recognition.start();
        isRecording = true;
        recordBtn.innerHTML = "🛑 Stopp";
    } else {
        recognition.stop();
        isRecording = false;
        recordBtn.innerHTML = "🎤 Aufnehmen";
        
        // GỌI HÀM KẾT NỐI API
        simulateAIFeedback(finalTranscript);
    }
}

// HÀM MỚI: ĐÃ ĐƯỢC NỐI VỚI VERCEL
async function simulateAIFeedback(text) {
    let aiCorrection = document.getElementById("ai-correction");
    let transcriptText = document.getElementById("transcript-text");

    if (!text.trim()) {
        transcriptText.innerHTML = "<b>Oops!</b>"; 
        aiCorrection.innerHTML = "<p style='color:red;'>Ich habe nichts gehört. (Kapi chưa nghe thấy gì cả)</p>";
        aiCorrection.style.display = "block";
        return;
    }

    aiCorrection.innerHTML = "<p style='color:#0984e3;'><i>Kapi đang suy nghĩ để sửa bài cho cậu... 🧠🦫</i></p>";
    aiCorrection.style.display = "block";

    try {
        // GỌI VÀO "PHÒNG TỐI" TẠI VERCEL THAY VÌ GỌI THẲNG GEMINI
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text })
        });

        const data = await response.json();
        
        if (data.result) {
            aiCorrection.innerHTML = data.result;
        } else {
            aiCorrection.innerHTML = "<p style='color:red;'>Kapi đang bị nghẽn mạch, cậu thử lại nhé!</p>";
        }
    } catch (error) {
        aiCorrection.innerHTML = "<p style='color:red;'>Lỗi mạng rồi! Không thể kết nối với não bộ Kapi.</p>";
        console.error(error);
    }
}

// ===== TIMER =====

function startTimer() {

clearInterval(countdown);

let time = 120;

countdown = setInterval(function(){

let minutes = Math.floor(time / 60);
let seconds = time % 60;

document.getElementById("timer").innerText =
minutes + ":" +
seconds.toString().padStart(2,"0");

time--;

if(time < 0){

clearInterval(countdown);

document.getElementById("timer").innerText =
"⏰ Zeit ist um!";

}

},1000);

}
