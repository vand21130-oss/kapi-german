// --- LOGIC NHẬN DIỆN GIỌNG NÓI CHROME ---
let recognition;
let isListening = false;
let finalTranscript = "";

if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'de-DE';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
        let interimTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript + " ";
            } else {
                interimTranscript += event.results[i][0].transcript;
            }
        }
        document.getElementById('transcript').innerHTML = "<b>" + finalTranscript + "</b> <i style='color:#999;'>" + interimTranscript + "</i>";
    };
    
    recognition.onerror = (e) => {
        console.log("Speech recognition error", e.error);
        isListening = false;
        document.getElementById('recordBtn').innerText = "🎤 Nhấn để Ghi âm";
        document.getElementById('recordBtn').className = "btn btn-blue";
    };
} else {
    alert("Trình duyệt của Vịt không hỗ trợ ghi âm trực tiếp. Hãy dùng Google Chrome trên máy tính nhé!");
}

function toggleSpeech() {
    if(!recognition) return alert("Trình duyệt không hỗ trợ Web Speech API.");
    const btn = document.getElementById('recordBtn');
    if (!isListening) {
        finalTranscript = "";
        document.getElementById('transcript').innerHTML = "<i>Đang nghe... 🦫</i>";
        document.getElementById('sprechenGrammarResult').innerHTML = "";
        recognition.start();
        btn.innerText = "🛑 Dừng ghi âm";
        btn.className = "btn btn-red";
        isListening = true;
    } else {
        recognition.stop();
        btn.innerText = "🎤 Nhấn để Ghi âm (Nói thành chữ)";
        btn.className = "btn btn-blue";
        isListening = false;
    }
}

async function checkSprechenGrammar() {
    if(!finalTranscript.trim()) return alert("Vịt chưa nói câu nào hoàn chỉnh kìa!");
    const resDiv = document.getElementById('sprechenGrammarResult');
    resDiv.innerHTML = "<p style='color:#e67e22;'><i>Đang nhờ LanguageTool kiểm tra mạo từ & đuôi tính từ... 🦫🔍</i></p>";
    await runLanguageToolCheck(finalTranscript, resDiv);
}

async function handleSchreibenCheck() {
    const text = document.getElementById('checkInput').value.trim();
    if(!text) return alert("Viết gì đó đi Vịt!");
    const resDiv = document.getElementById('schreibenGrammarResult');
    resDiv.innerHTML = "<p style='color:#e67e22;'><i>Kapi đang soi lỗi... 🦫🔍</i></p>";
    await runLanguageToolCheck(text, resDiv);
}

// --- CORE: LANGUAGE TOOL API FETCH ---
async function runLanguageToolCheck(text, resultContainer) {
    try {
        const response = await fetch('https://api.languagetool.org/v2/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ text: text, language: 'de-DE' })
        });
        const data = await response.json();
        
        if (data.matches.length === 0) {
            resultContainer.innerHTML = `
                <div style="background:#e8f5e9; padding:15px; border-radius:8px; border-left:4px solid #2ecc71;">
                    <h3 style="color:#27ae60; margin:0;">✅ Xuất sắc!</h3>
                    <p style="margin:5px 0 0 0; font-size:16px;">Về mặt cấu trúc cơ bản, chính tả, mạo từ và đuôi tính từ, câu của cậu chuẩn không cần chỉnh! <br><br><i>💡 Mẹo: Nếu cậu dùng câu phức (Passiv, Nebensatz), hãy copy đoạn này gửi cho tớ (Gemini) để tớ kiểm tra văn phong học thuật B2 cho nhé!</i></p>
                </div>
            `;
        } else {
            let html = `<h3 style="color:#e74c3c; margin-top:0;">❌ Kapi phát hiện ${data.matches.length} lỗi:</h3>`;
            data.matches.forEach(match => {
                let suggestions = match.replacements.slice(0, 3).map(r => r.value).join(" <b>hoặc</b> ");
                html += `
                    <div class="error-item">
                        <span style="font-weight:bold; color:#c0392b;">Lỗi:</span> ${match.message} <br>
                        ${suggestions ? `<span style="color:#27ae60;">💡 Kapi khuyên sửa thành: <b>${suggestions}</b></span>` : ''}
                    </div>
                `;
            });
            resultContainer.innerHTML = html;
        }
    } catch (e) {
        resultContainer.innerHTML = `<p style="color:red;">Lỗi kết nối tới máy chủ LanguageTool: ${e.message}</p>`;
    }
}

function startMedizinQuiz() {
    score = 0; 
    currentQuestionIndex = 0; 
    shuffledQuestions = [...medizinQuestions].sort(() => Math.random() - 0.5);
    renderQuiz();
}

function renderQuiz() {
    if (currentQuestionIndex >= shuffledQuestions.length) {
        setHTML("main-content", `
            <div class="card" style="text-align:center;">
                <h2>🏆 Kết quả Quiz</h2>
                <p style="font-size:24px;">Điểm của Vịt: <b>${score} / ${shuffledQuestions.length}</b></p>
                <button class="btn btn-green" onclick="startMedizinQuiz()">🔄 Chơi lại</button>
            </div>
            <button class="btn btn-light" style="margin-top:20px;" onclick="showVokabelHauptmenu()">🔙 Trở lại Menu Từ Vựng</button>
        `);
        return;
    }
    
    let q = shuffledQuestions[currentQuestionIndex];
    let html = `
        <div class="card">
            <p style="color:#666; margin-top:0;">Câu hỏi ${currentQuestionIndex + 1} / ${shuffledQuestions.length} | Điểm: ${score}</p>
            <h3 style="font-size:22px; line-height:1.5;">${q.frage}</h3>
            <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
    `;
    
    q.antworten.forEach((ans, index) => {
        html += `<button class="btn btn-light" style="text-align:left; border:1px solid #ddd;" onclick="checkQuizAnswer(${index}, ${q.richtig}, '${encodeURIComponent(q.erklaerung)}')">${String.fromCharCode(65+index)}. ${ans}</button>`;
    });
    
    html += `</div></div>`;
    setHTML("main-content", html);
}

function checkQuizAnswer(chosen, correct, erklaerungEncoded) {
    let erklaerung = decodeURIComponent(erklaerungEncoded);
    let isCorrect = chosen === correct;
    if(isCorrect) score++;
    
    setHTML("main-content", `
        <div class="card" style="text-align:center; border: 2px solid ${isCorrect ? '#2ecc71' : '#e74c3c'};">
            <h2 style="color:${isCorrect ? '#27ae60' : '#c0392b'};">${isCorrect ? '✅ Chính xác!' : '❌ Sai rồi!'}</h2>
            <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin:20px 0; font-size:18px; text-align:left;">
                💡 <b>Giải thích:</b> ${erklaerung}
            </div>
            <button class="btn btn-blue" onclick="currentQuestionIndex++; renderQuiz()">➡️ Câu tiếp theo</button>
        </div>
    `);
}
