<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapi - Deutsch B2</title>
    
    <!-- Gọi 3 "bộ não" của Kapi (thêm defer để tránh lỗi Timeout) -->
    <script src="vokabel-data.js" defer></script>
    <script src="horen-data.js" defer></script>
    <script src="kapi-logic.js" defer></script>
    
    <style>
        body { margin:0; min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; background:white; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 50px; }
        
        .btn-kapi { font-size:22px; padding:15px 25px; margin:10px; border-radius:20px; border:none; cursor:pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; color: #333; }
        .btn-kapi:hover { transform: translateY(-2px); box-shadow: 0 6px 10px rgba(0,0,0,0.1); }
        
        .btn-green { background: #dcedc8; }
        .btn-red { background: #ffcdd2; }
        .btn-home { background: #eee; }
        .btn-a1 { background: #e8f5e9; }
        .btn-a2 { background: #e3f2fd; }
        .btn-b1 { background: #fff9c4; }
        .btn-b2 { background: #ffe0b2; }
        
        .btn-lesson-1 { background: #f3e5f5; }
        .btn-lesson-2 { background: #e1f5fe; }
        .btn-lesson-3 { background: #e8f5e9; }
        .btn-lesson-4 { background: #fff3e0; }
        .btn-lesson-5 { background: #ffecb3; }

        #feedback-area { display:none; max-width:800px; width:90%; margin:10px auto; padding:20px; background-color:#f5f5f5; border-radius:12px; text-align:left; border: 1px solid #ddd; }
        .transcript-box { font-size:20px; margin-top:0; min-height:100px; padding:15px; background:#fff; border:2px dashed #bdc3c7; border-radius:8px; outline:none; cursor:text; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: 0 auto; }
        .btn-grid { padding: 15px; border-radius: 15px; border: none; cursor: pointer; font-size: 18px; text-align: left; transition: 0.2s; background: #e3f2fd; }
        .btn-grid:hover { background: #bbdefb; }
        .btn-full { grid-column: span 2; font-weight: bold; text-align: center; }
        
        input[type="text"], textarea { width: 100%; box-sizing: border-box; font-family: inherit; font-size: 20px; padding: 15px; border-radius: 12px; border: 2px solid #ccc; outline: none; margin-bottom: 15px; }
        /* Phép thuật cho điện thoại: Tự động xếp thành 1 cột nếu màn hình nhỏ */
        @media (max-width: 500px) {
            .grid-container { grid-template-columns: 1fr; }
            .btn-kapi { font-size: 18px; padding: 12px 20px; }
        }
        /* Hiệu ứng làm nổi bật từ vựng B2 */
        .vocab-highlight {
            font-weight: bold;
            color: #d35400;
            border-bottom: 2px dashed #d35400;
            cursor: help;
            position: relative;
            display: inline-block;
        }

        /* Khung hiển thị nghĩa tiếng Việt khi hover */
        .vocab-highlight:hover::after {
            content: attr(data-vi);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: normal;
            white-space: nowrap;
            z-index: 10;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h1>Hallo! Ich bin Kapi 🦫</h1>
<img src="capy.png" style="width: 450px; max-width: 90%; height: auto;" onerror="this.src='https://placehold.co/400x300/e3f2fd/1565c0?text=Kapi+Image'">
<p id="message" style="font-size:30px; margin:20px;">Guten Morgen! Schön, dich kennenzulernen! 🌟</p>
<p id="timer" style="font-size:40px; color:#e67e22; font-weight:bold; margin: 0;"></p>

<div id="feedback-area"></div>

<div id="buttons">
    <!-- Nút cũ của Vịt -->
    <button class="btn-kapi" style="background:#4CAF50; color:white;" onclick="sayHallo()">👋 Hallo Kapi</button>
    
</div>

<!-- BỘ ĐẾM LƯỢT TRUY CẬP PRO (Đếm view thật, chống F5) -->
<div style="text-align: center; margin-top: 40px; margin-bottom: 20px; padding: 10px;">
    <p style="font-size: 14px; color: #7f8c8d; font-weight: bold; margin-bottom: 5px;">👀 Số lượt ghé thăm bé Kapi:</p>
    <img src="https://komarev.com/ghpvc/?username=kapi-deutsch-project-v2&color=orange&style=flat-square" alt="Visitor Count" style="border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
</div>
</body>
</html>
