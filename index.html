async function toggleRecording() {
    let recordBtn = document.getElementById("record-btn");
    let feedbackArea = document.getElementById("feedback-area");
    let aiCorrection = document.getElementById("ai-correction");
    if (!isRecording) {
        audioChunks = [];
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        isRecording = true;
        recordBtn.innerHTML = "🛑 Stopp";
        recordBtn.style.backgroundColor = "#e74c3c";
        recordBtn.style.color = "white";
        feedbackArea.style.display = "block";
        aiCorrection.style.display = "none";
        document.getElementById("transcript-text").innerHTML = "<i>Kapi hört zu... 🦫🎤</i>";
    } else {
        mediaRecorder.stop();
        isRecording = false;
        recordBtn.innerHTML = "🎤 Aufnehmen";
        recordBtn.style.backgroundColor = "#e2e8f0";
        recordBtn.style.color = "black";
        document.getElementById("transcript-text").innerHTML = "<i>Kapi denkt nach... 🧠</i>";
        mediaRecorder.onstop = async () => {
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'audio.webm');
            aiCorrection.innerHTML = "<p style='color:#0984e3;'><i>Kapi đang nghe và suy nghĩ... 🧠🦫</i></p>";
            aiCorrection.style.display = "block";
            try {
                const transcribeRes = await fetch('/api/transcribe', { method: 'POST', body: formData });
                const transcribeData = await transcribeRes.json();
                const text = transcribeData.text;
                if (!text || !text.trim()) {
                    document.getElementById("transcript-text").innerHTML = "<b>Oops!</b>";
                    aiCorrection.innerHTML = "<p style='color:red;'>Ich habe nichts gehört.</p>";
                    return;
                }
                document.getElementById("transcript-text").innerHTML = "<b>Du sagst:</b> " + text;
                const chatRes = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const chatData = await chatRes.json();
                aiCorrection.innerHTML = chatData.result || "<p style='color:red;'>" + (chatData.error || "Lỗi API") + "</p>";
            } catch (error) {
                aiCorrection.innerHTML = "<p style='color:red;'>Lỗi kết nối: " + error.message + "</p>";
            }
        };
    }
}

function startTimer() {
    clearInterval(countdown);
    let time = 120;
    countdown = setInterval(function() {
        let m = Math.floor(time / 60);
        let s = time % 60;
        document.getElementById("timer").innerText = m + ":" + s.toString().padStart(2, "0");
        time--;
        if (time < 0) { clearInterval(countdown); document.getElementById("timer").innerText = "⏰ Zeit ist um!"; }
    }, 1000);
}

function showVokabelGruppe(gruppe) {

    currentVokabelIndex = 0;
    currentShuffledWoerter = [...vokabelGruppen[gruppe].woerter].sort(() => Math.random() - 0.5);

}

function showVokabel() {
    const gruppeTitel = vokabelGruppen[currentGruppe].titel;
    const wort = currentShuffledWoerter[currentVokabelIndex];
    const total = currentShuffledWoerter.length;
    const isMedizin = ['krankheiten','diagnostik','verbandmaterial','intensiv'].includes(currentGruppe);

        <img src="${wort.bild}" alt="${wort.de}" style="width:200px;height:200px;object-fit:contain;border-radius:12px;margin:10px;" onerror="this.onerror=null;this.src='https://placehold.co/200x200/e3f2fd/1565c0?text=Bild'"><br>

// ===== LOGIC CHẤM BÀI KHÔNG LỖI (HYBRID CHECKER) ========
// ========================================================
async function checkCauTrucChung(textInput, targetWordDe, targetWordVi) {
    let feedbackArea = document.getElementById("feedback-area");
    let aiCorrection = document.getElementById("ai-correction");
    
    feedbackArea.style.display = "block";
    aiCorrection.style.display = "block";
    aiCorrection.innerHTML = `<p style="font-size:18px;color:#e67e22;"><i>Kapi đang đọc câu của cậu... 🦫🔍</i></p>`;

    let activeKey = localStorage.getItem("gemini_vịt_key");

    if (activeKey) {
        // --- NẾU CÓ KEY: GỌI THẲNG GEMINI TỪ TRÌNH DUYỆT KHÔNG QUA PROXY VERCEL ---
        let prompt = `Du bist ein strenger Deutschlehrer für das Niveau B2/C1.
        Schüler schreibt: "${textInput}" (Vokabel: ${targetWordDe} - ${targetWordVi}).
        Analyse die Grammatik (Adjektivendungen, Verbstellung, Artikel) genau.
        Falls falsch, korrigiere es (Korrektur). Falls richtig, lobe den Schüler und zeige eine akademischere Variante auf.
        Erkläre die Fehler kurz auf Vietnamesisch. Antworte NUR mit sauberem HTML-Code (nutze <p>, <b>, <i>, <ul>, <li>). Kein Markdown \`\`\`html!`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${activeKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            if (data.candidates && data.candidates[0].content) {
                let txt = data.candidates[0].content.parts[0].text;
                aiCorrection.innerHTML = `<div style="font-size:18px;line-height:1.6;">${txt}</div>`;
                return;
            }
        } catch (e) {
            console.log("Lỗi Gemini, tự động chuyển sang LanguageTool:", e);
        }

    // --- NẾU KHÔNG CÓ KEY HOẶC KEY LỖI: CHUYỂN SANG LANGUAGE TOOL MIỄN PHÍ VÔ HẠN ---
    try {
        const response = await fetch('https://api.languagetool.org/v2/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ text: textInput, language: 'de-DE' })
        });
        const data = await response.json();
        
        if (data.matches.length === 0) {
            aiCorrection.innerHTML = `
                <h3 style="color:#2ecc71; margin-top:0;">✅ Chuẩn chính tả!</h3>
                <p style="font-size:18px;">Câu của cậu chuẩn không sai lỗi chính tả cơ bản nào. (Hãy cắm API Key ở trên để Kapi sửa văn phong nâng cao B2 mượt hơn nhé Vịt!)</p>
            `;
        } else {
            let fehlerHtml = `<h3 style="color:#e74c3c; margin-top:0;">❌ Lỗi chính tả & Ngữ pháp cơ bản:</h3><ul style="font-size:18px; padding-left:20px;">`;
            data.matches.forEach(match => {
                let s = match.replacements.slice(0, 2).map(r => r.value).join(" hoặc ");
                fehlerHtml += `<li style="margin-bottom:10px;"><b>Lỗi:</b> ${match.message} ${s ? `<br><span style="color:#27ae60;">💡 Nên sửa thành: <b>${s}</b></span>` : ''}</li>`;
            });
            fehlerHtml += `</ul>`;
            aiCorrection.innerHTML = fehlerHtml;
        }
    } catch (err) {
        aiCorrection.innerHTML = `<p style="color:red;">Không thể kết nối tới bộ kiểm tra: ${err.message}</p>`;
    }

async function checkGrammatikMitAI() {
    let userInput = document.getElementById("userInput").value.trim();
    let feedbackArea = document.getElementById("feedback-area");
    let aiCorrection = document.getElementById("ai-correction");

    if (!userInput) { alert("Cậu chưa viết gì kìa! Kapi không chấm giấy trắng đâu nha!"); return; }

    let cleanDe = currentPracticeWord.de.replace(/^(Der|Die|Das|sich)\s+/i, '').trim();
    if (!userInput.toLowerCase().includes(cleanDe.toLowerCase())) {
        feedbackArea.style.display = "block";
        aiCorrection.style.display = "block";
        aiCorrection.innerHTML = `<p style='color:red;font-size:18px;'>❌ Kapi thấy cậu chưa dùng từ <b>${currentPracticeWord.de}</b> trong câu kìa!</p>`;
        return;
    }

    feedbackArea.style.display = "block";
    aiCorrection.style.display = "block";
    aiCorrection.innerHTML = `<div style="text-align:center;"><p style="font-size:22px;color:#e67e22;"><i>Kapi đang lôi từ điển ra soi... 🦫🔍</i></p></div>`;

    try {
        const response = await fetch('/api/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                tuViet: currentPracticeWord.vi,
                tuDuc: currentPracticeWord.de,
                cauVidu: userInput
            })
        });
        const data = await response.json();
        if (data.result) {
            aiCorrection.innerHTML = `<div style="font-size:18px;line-height:1.6;">${data.result}</div>`;
        } else {
            aiCorrection.innerHTML = `<p style='color:red;'>${data.error || "Lỗi không xác định"}</p>`;
        }
    } catch (error) {
        aiCorrection.innerHTML = `<p style='color:red;'>Lỗi kết nối: ${error.message}</p>`;
    }
}

// ===== MINIGAME =====
function startMinigame() {
    minigameScore = 0; minigameIndex = 0;
    minigameQuestions = [...currentShuffledWoerter].sort(() => Math.random() - 0.5);
    showMinigameQuestion();
}

function showMinigameQuestion() {
    if (minigameIndex >= minigameQuestions.length) { showMinigameResult(); return; }
    const current = minigameQuestions[minigameIndex];
    const allWoerter = vokabelGruppen[currentGruppe].woerter;
    const isMedizin = ['krankheiten','diagnostik','verbandmaterial','intensiv'].includes(currentGruppe);
    const backMenuFn = isMedizin ? "showMedizinMenu()" : "showAlltagMenu()";

    let wrongAnswers = allWoerter.filter(w => w.de !== current.de).sort(() => Math.random() - 0.5).slice(0, 3);
    let answers = [...wrongAnswers, current].sort(() => Math.random() - 0.5);

    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = `
        <span style="font-size:16px;color:#666;">🎮 Minigame | Câu ${minigameIndex + 1}/${minigameQuestions.length} | Điểm: ${minigameScore}</span><br><br>
        <img src="${current.bild}" alt="${current.de}" style="width:200px;height:200px;object-fit:contain;border-radius:12px;margin:10px;" onerror="this.onerror=null;this.src='https://placehold.co/200x200/e3f2fd/1565c0?text=?'"><br>
        <b style="font-size:22px;">Đây là gì? / Was ist das?</b>
    `;
    document.getElementById("buttons").innerHTML = answers.map(a => `
        <button onclick="checkMinigame('${encodeURIComponent(a.de)}','${encodeURIComponent(current.de)}','${encodeURIComponent(current.vi)}')"
            style="font-size:18px;padding:12px 20px;margin:8px;border-radius:15px;border:2px solid #ddd;cursor:pointer;display:block;width:90%;max-width:500px;text-align:left;background:white;">${a.de}</button>
    `).join('') + `<button onclick="${backMenuFn}" style="font-size:16px;padding:8px 18px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#eee;">🏠 Menu</button>`;
}

function checkMinigame(chosenEncoded, correctEncoded, viEncoded) {
    const chosen = decodeURIComponent(chosenEncoded);
    const correct = decodeURIComponent(correctEncoded);
    const vi = decodeURIComponent(viEncoded);
    const isCorrect = chosen === correct;
    if (isCorrect) minigameScore++;

    document.getElementById("feedback-area").style.display = "block";
    const aiCorrection = document.getElementById("ai-correction");
    aiCorrection.style.display = "block";
    aiCorrection.innerHTML = `
        <p style="font-size:22px;margin-top:0;">${isCorrect ? "✅ Richtig! / Đúng rồi!" : "❌ Falsch! / Sai rồi!"}</p>
        ${!isCorrect ? `<p style="font-size:18px;color:green;">✔️ Đáp án đúng: <b>${correct}</b></p>` : ""}
        <p style="font-size:16px;">${correct} = ${vi}</p>
        <button onclick="nextMinigame()" style="font-size:20px;padding:10px 25px;border-radius:15px;border:none;cursor:pointer;background:#4CAF50;color:white;margin-top:10px;">
            ${minigameIndex + 1 >= minigameQuestions.length ? "🏆 Kết quả" : "➡️ Tiếp"}
        </button>
    `;
}

function nextMinigame() {
    minigameIndex++;
    document.getElementById("feedback-area").style.display = "none";
    showMinigameQuestion();
}

function showMinigameResult() {
    const total = minigameQuestions.length;
    const percent = Math.round((minigameScore / total) * 100);
    const emoji = percent >= 80 ? "🏆" : percent >= 60 ? "👍" : "💪";
    const isMedizin = ['krankheiten','diagnostik','verbandmaterial','intensiv'].includes(currentGruppe);
    const backMenuFn = isMedizin ? "showMedizinMenu()" : "showAlltagMenu()";

    document.getElementById("message").innerHTML = `
        ${emoji} <b>Kết quả Minigame!</b><br><br>${minigameScore}/${total} (${percent}%)<br><br>
        ${percent >= 80 ? "Ausgezeichnet! 🌟" : percent >= 60 ? "Gut gemacht! 👏" : "Weiter üben! 💪"}
    `;
    document.getElementById("buttons").innerHTML = `
        <button onclick="startMinigame()" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#ff9800;color:white;">🔄 Nochmal</button>
        <button onclick="showVokabelGruppe(currentGruppe)" style="font-size:20px;padding:12px 22px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#e3f2fd;">📖 Ôn lại từ</button>
        <button onclick="${backMenuFn}" style="font-size:18px;padding:10px 20px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#eee;">⬅️ Menu</button>
    `;
    document.getElementById("feedback-area").style.display = "none";
}

// ===== QUIZ Y KHOA =====
function startMedizin() {
    score = 0; currentQuestionIndex = 0; questionHistory = [];
    shuffledQuestions = [...medizinQuestions].sort(() => Math.random() - 0.5);
    showQuestion();
}

function showQuestion() {
    if (currentQuestionIndex >= shuffledQuestions.length) { showResult(); return; }
    const q = shuffledQuestions[currentQuestionIndex];
    const typeLabel = q.type === "luecke" ? "🔤 Điền vào chỗ trống" : q.type === "bedeutung" ? "📚 Chọn nghĩa đúng" : "✏️ Chọn từ đúng";

    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = `
        <span style="font-size:16px;color:#666;">${typeLabel} | Câu ${currentQuestionIndex + 1}/${shuffledQuestions.length} | Điểm: ${score}</span><br><br>
        <b>${q.frage}</b>
    `;

    const shuffledAnswers = q.antworten.map((a, i) => ({text: a, original: i})).sort(() => Math.random() - 0.5);
    const labels = ["A","B","C","D"];
    const backBtn = currentQuestionIndex > 0 ? `<button onclick="prevQuestion()" style="font-size:18px;padding:10px 20px;margin:8px;border-radius:15px;border:2px solid #ddd;cursor:pointer;background:#eee;">⬅️ Câu trước</button>` : '';

    document.getElementById("buttons").innerHTML = shuffledAnswers.map((a, i) => `
        <button onclick="checkAnswer(${a.original},${q.richtig},'${encodeURIComponent(q.erklaerung)}','${encodeURIComponent(q.antworten[q.richtig])}')"
            style="font-size:18px;padding:12px 20px;margin:8px;border-radius:15px;border:2px solid #ddd;cursor:pointer;display:block;width:90%;max-width:600px;text-align:left;background:white;">
            <b>${labels[i]}.</b> ${a.text}
        </button>
    `).join('') + backBtn + `<button onclick="showMedizinMenu()" style="font-size:18px;padding:10px 20px;margin:8px;border-radius:15px;border:none;cursor:pointer;background:#eee;">🏠 Menu</button>`;
}

function prevQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        if (questionHistory.length > 0) { score = questionHistory[questionHistory.length - 1].score; questionHistory.pop(); }
        showQuestion();
    }
}

function checkAnswer(chosen, correct, erklaerungEncoded, correctAnswerEncoded) {
    const erklaerung = decodeURIComponent(erklaerungEncoded);
    const correctAnswer = decodeURIComponent(correctAnswerEncoded);
    const isCorrect = chosen === correct;
    questionHistory.push({ index: currentQuestionIndex, score: score });
    if (isCorrect) score++;

    document.getElementById("feedback-area").style.display = "block";
    const aiCorrection = document.getElementById("ai-correction");
    aiCorrection.style.display = "block";
    aiCorrection.innerHTML = `
        <p style="font-size:22px;margin-top:0;">${isCorrect ? "✅ Richtig! / Đúng rồi!" : "❌ Falsch! / Sai rồi!"}</p>
        ${!isCorrect ? `<p style="font-size:18px;color:green;">✔️ Đáp án đúng: <b>${correctAnswer}</b></p>` : ""}
        <p style="font-size:16px;background:#f0f0f0;padding:10px;border-radius:8px;">${erklaerung}</p>
        <button onclick="nextQuestion()" style="font-size:20px;padding:10px 25px;border-radius:15px;border:none;cursor:pointer;background:#4CAF50;color:white;margin-top:10px;">
            ${currentQuestionIndex + 1 >= shuffledQuestions.length ? "🏆 Ergebnis sehen" : "➡️ Nächste Frage"}
        </button>
    `;
}

function nextQuestion() {
    currentQuestionIndex++;
    document.getElementById("feedback-area").style.display = "none";
    showQuestion();
}

function showResult() {
    const percent = Math.round((score / shuffledQuestions.length) * 100);
    const emoji = percent >= 80 ? "🏆" : percent >= 60 ? "👍" : "💪";
    document.getElementById("message").innerHTML = `
        ${emoji} <b>Ergebnis / Kết quả</b><br><br>
        ${score}/${shuffledQuestions.length} Punkte (${percent}%)<br><br>
        ${percent >= 80 ? "Ausgezeichnet! Sehr gut gemacht! 🌟" : percent >= 60 ? "Gut gemacht! Weiter so! 👏" : "Nicht aufgeben! Übung macht den Meister! 💪"}
    `;
    document.getElementById("buttons").innerHTML = `
        <button onclick="startMedizin()" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#e8f5e9;">🔄 Nochmal / Thử lại</button>
        <button onclick="showMedizinMenu()" style="font-size:20px;padding:10px 20px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#eee;">⬅️ Zurück</button>
    `;
    document.getElementById("feedback-area").style.display = "none";
}
</script>
</body>
</html>
