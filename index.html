// ==========================================
let currentLevel = "B2";
let countdown;

function sayHallo() {
    document.getElementById("message").innerText = "Hallo! Wie geht's dir? 😊";

        <button class="btn btn-green" onclick="goodAnswer()">😊 Mir geht's gut!</button>
        <button class="btn btn-red" onclick="badAnswer()">😢 Nicht so gut.</button>

}
function goodAnswer() { document.getElementById("message").innerText = "Das freut mich! 🌟"; showLevels(); }
function badAnswer() { document.getElementById("message").innerText = "Oh nein! Hoffentlich wird dein Tag besser. 💛"; showLevels(); }

function showLevels() {
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerText = "Welches Niveau möchtest du heute üben? 📚";
    document.getElementById("buttons").innerHTML = `
        <button class="btn btn-light" onclick="chooseLevel('A1')">📗 A1</button>
        <button class="btn btn-light" onclick="chooseLevel('A2')">📘 A2</button>
        <button class="btn btn-light" onclick="chooseLevel('B1')">📒 B1</button>
        <button class="btn btn-orange" onclick="chooseLevel('B2')">📙 B2</button>
    `;
}

function chooseLevel(level) {
    currentLevel = level;
    document.getElementById("message").innerText = "Super! Heute üben wir Deutsch auf Niveau " + level + " 🇩🇪";
    showLessons();
}

function showLessons() {
    document.getElementById("feedback-area").style.display = "none";
    clearInterval(countdown);
    document.getElementById("timer").innerText = "";
    
    document.getElementById("buttons").innerHTML = `
        <button class="btn btn-blue" onclick="chooseLesson('Sprechen')">🗣️ Sprechen (Nói)</button>
        <button class="btn btn-purple" onclick="chooseLesson('Hören')">🎧 Hören (Nghe)</button>
        <button class="btn btn-green" onclick="chooseLesson('Schreiben')">✍️ Schreiben (Viết)</button>
        <button class="btn btn-orange" onclick="chooseLesson('Vokabeln')">📝 Vokabeln (Từ vựng)</button>
        <br><button class="btn btn-light" onclick="showLevels()">⬅️ Đổi Level</button>
    `;
}

function chooseLesson(lesson) {
    if (lesson === "Sprechen") {
        document.getElementById("message").innerHTML = "Welchen Teil möchtest du üben?";
        document.getElementById("buttons").innerHTML = `
            <button class="btn btn-blue" onclick="showTeil1()">🎤 Teil 1 (39 Đề)</button>
            <button class="btn btn-blue" onclick="showTeil2()">🎤 Teil 2 (25 Đề)</button>
            <button class="btn btn-light" onclick="showLessons()">⬅️ Zurück</button>
        `;
        return;
    }
    if (lesson === "Vokabeln") { showVokabelHauptmenu(); return; }
    if (lesson === "Schreiben") { showSchreibenMenu(); return; }
    if (lesson === "Hören") { showHoerenMenu(); return; }
}

function startTimer() {
    clearInterval(countdown);
    let time = 180; // 3 phút cho B2
    countdown = setInterval(function() {
        let m = Math.floor(time / 60);
        let s = time % 60;
        document.getElementById("timer").innerText = m + ":" + s.toString().padStart(2, "0");
        time--;
        if (time < 0) { clearInterval(countdown); document.getElementById("timer").innerText = "⏰ Zeit ist um!"; }
    }, 1000);
}

async function checkSpokenGrammar() {
    let text = document.getElementById("transcript-text").innerText.trim();
    if(!text || text.includes("Windows + H")) return alert("Vịt chưa gõ/đọc gì cả!");
    let aiCorrection = document.getElementById("ai-correction");
    aiCorrection.style.display = "block";
    aiCorrection.innerHTML = "<p style='color:#e67e22;'><i>Kapi đang soi lỗi mạo từ, đuôi tính từ... 🦫🔍</i></p>";
    await checkGrammarLT(text, aiCorrection);
}

// Hàm dùng chung cho LanguageTool API
async function checkGrammarLT(textToCheck, container) {
    try {
        const response = await fetch('https://api.languagetool.org/v2/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ text: textToCheck, language: 'de-DE' })
        });
        const data = await response.json();
        
        if (data.matches.length === 0) {
            container.innerHTML = `<div style="background:#e8f5e9; padding:15px; border-radius:8px; border-left:4px solid #2ecc71;"><h3 style="color:#27ae60; margin:0;">✅ Wunderbar!</h3><p style="margin:5px 0 0 0;">Câu của cậu chuẩn mạo từ và đuôi tính từ rồi!</p></div>`;
        } else {
            let html = `<h3 style="color:#e74c3c; margin-top:0;">❌ Kapi phát hiện ${data.matches.length} lỗi cơ bản:</h3>`;
            data.matches.forEach(m => {
                let suggestions = m.replacements.slice(0, 3).map(r => r.value).join(" <b>hoặc</b> ");
                html += `<div class="error-item"><span style="font-weight:bold; color:#c0392b;">Lỗi:</span> ${m.message} <br>${suggestions ? `<span style="color:#27ae60;">💡 Kapi khuyên sửa thành: <b>${suggestions}</b></span>` : ''}</div>`;
            });
            container.innerHTML = html;
        }
    } catch(e) {
        container.innerHTML = `<p style="color:red;">Lỗi kết nối máy chủ LanguageTool!</p>`;
    }
}

// ==========================================
// 6. HÖREN (Nghe thi thật - Chấm điểm + Transcript)
// ==========================================
let currentPruefungIndex = 0;
let currentTeilIndex = 0;
let userAnswers = [];

function showHoerenMenu() {
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = `🎧 Kho đề Hören - Trình độ ${currentLevel}`;
    
    let html = `<div style="max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:10px;">`;
    let hasExams = false;
    
    if (typeof alleHoerenPruefungen !== 'undefined') {
        alleHoerenPruefungen.forEach((pruefung, index) => {
            if (pruefung.niveau === currentLevel) {
                hasExams = true;
                html += `<button class="btn btn-blue" onclick="showHoerenTeile(${index})">📚 ${pruefung.name}</button>`;
            }
        });
    }

    if (!hasExams) {
        html += `<p style="font-size:18px; color:#e74c3c; font-style:italic;">Oops! Trình độ ${currentLevel} hiện tại chưa có đề nghe nào. Cậu hãy nạp thêm vào tủ hồ sơ nhé! 🦫</p>`;
    }
    
    html += `</div>`;
    document.getElementById("buttons").innerHTML = html + `<button class="btn btn-light" style="margin-top:20px;" onclick="showLessons()">⬅️ Zurück</button>`;
}

function showHoerenTeile(pruefungIndex) {
    currentPruefungIndex = pruefungIndex;
    let pruefung = alleHoerenPruefungen[pruefungIndex];
    document.getElementById("message").innerHTML = `🎧 ${pruefung.name}`;
    
    let html = `<div style="max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:10px;">`;
    pruefung.teile.forEach((teil, index) => {
        html += `<button class="btn btn-purple" onclick="startHoerenTeil(${index})">▶️ ${teil.teilName}</button>`;
    });
    html += `</div>`;
    
    document.getElementById("buttons").innerHTML = html + `<button class="btn btn-light" style="margin-top:20px;" onclick="showHoerenMenu()">⬅️ Chọn đề khác</button>`;
}

function startHoerenTeil(teilIndex) {
    currentTeilIndex = teilIndex;
    let teil = alleHoerenPruefungen[currentPruefungIndex].teile[teilIndex];
    userAnswers = new Array(teil.fragen.length).fill(null);
    
    document.getElementById("message").innerHTML = `<b>${teil.teilName}</b>`;
    document.getElementById("feedback-area").style.display = "block";
    
    let html = `
        <div style="position:sticky; top:0; background:#fff; padding:15px; border-bottom:2px solid #ddd; z-index:100; text-align:center; border-radius:8px 8px 0 0;">
            <p style="color:#e67e22; font-weight:bold; margin-top:0;">Vừa nghe vừa chọn đáp án bên dưới nhé Vịt!</p>
            <audio controls style="width: 100%; outline: none;">
                <source src="${teil.audioSrc}" type="audio/mpeg">
            </audio>
        </div>
        <div style="padding:20px;">
    `;
    
    teil.fragen.forEach((q, qIndex) => {
        html += `<div style="margin-bottom:25px; padding-bottom:15px; border-bottom:1px dashed #ccc;">`;
        html += `<h4 style="margin-bottom:10px;">${q.frage}</h4>`;
        html += `<div style="display:flex; flex-direction:column; gap:8px;">`;
        
        q.antworten.forEach((ans, aIndex) => {
            html += `
                <label style="cursor:pointer; display:flex; align-items:center; gap:10px; background:#f9f9f9; padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <input type="radio" name="q_${qIndex}" value="${aIndex}" onchange="selectAnswer(${qIndex}, ${aIndex})" style="width:18px;height:18px;">
                    <span style="font-size:18px;">${ans}</span>
                </label>
            `;
        });
        html += `</div></div>`;
    });
    
    html += `<button class="btn btn-orange" style="width:100%; font-size:20px;" onclick="submitHoeren()">📝 Nộp bài & Chấm điểm</button></div>`;
    
    document.getElementById("feedback-area").innerHTML = html;
    document.getElementById("buttons").innerHTML = `<button class="btn btn-light" onclick="showHoerenTeile(${currentPruefungIndex})">⬅️ Quay lại</button>`;
}

function selectAnswer(qIndex, aIndex) { userAnswers[qIndex] = aIndex; }

function submitHoeren() {
    let teil = alleHoerenPruefungen[currentPruefungIndex].teile[currentTeilIndex];
    let score = 0;
    
    let resultHtml = `<div style="padding:20px;"><h2 style="text-align:center; color:#2c3e50;">Kết quả chấm bài</h2>`;
    
    teil.fragen.forEach((q, qIndex) => {
        let isCorrect = (userAnswers[qIndex] === q.richtig);
        if (isCorrect) score++;
        
        let color = isCorrect ? "#2ecc71" : "#e74c3c";
        let icon = isCorrect ? "✅" : "❌";
        
        resultHtml += `<div style="margin-bottom:15px; padding:15px; border-radius:8px; border-left:5px solid ${color}; background:#fcfcfc;">`;
        resultHtml += `<h4 style="margin:0 0 10px 0;">${icon} ${q.frage}</h4>`;
        
        if (!isCorrect) {
            let userAnswerText = userAnswers[qIndex] !== null ? q.antworten[userAnswers[qIndex]] : "Chưa làm";
            resultHtml += `<p style="color:#e74c3c; margin:5px 0;">Cậu chọn: <s>${userAnswerText}</s></p>`;
        }
        resultHtml += `<p style="color:#27ae60; font-weight:bold; margin:5px 0;">Đáp án đúng: ${q.antworten[q.richtig]}</p>`;
        
        // HIỂN THỊ KEYWORD / TRANSCRIPT NẾU CÓ
        if (q.begruendung) {
            resultHtml += `<p style="color:#34495e; font-size:16px; margin-top:10px; background:#e8f4f8; padding:10px; border-radius:5px; border-left: 4px solid #3498db;">💡 <b>Giải thích / Transcript:</b><br>${q.begruendung}</p>`;
        }
        resultHtml += `</div>`;
    });
    
    resultHtml += `
        <div style="text-align:center; margin-top:20px;">
            <h3 style="font-size:24px;">Điểm của cậu: <span style="color:#e67e22;">${score} / ${teil.fragen.length}</span></h3>
            <button class="btn btn-blue" onclick="startHoerenTeil(${currentTeilIndex})">🔄 Nghe lại phần này</button>
        </div></div>
    `;
    
    document.getElementById("feedback-area").innerHTML = resultHtml;
}


// ==========================================
// 7. VOKABELN (Spaced Repetition - Lặp lại ngắt quãng)
// ==========================================
let quizWords = [];
let currentQuizIndex = 0;
let quizScore = 0;
let currentMissedWords = [];

function getSavedMissedWords() {
    return JSON.parse(localStorage.getItem('kapi_missed_words')) || [];
}

function saveMissedWords(wordsArray) {
    localStorage.setItem('kapi_missed_words', JSON.stringify(wordsArray));
}

function showVokabelHauptmenu() {
    document.getElementById("feedback-area").style.display = "none";
    let savedMissed = getSavedMissedWords();
    
    let warningHtml = "";
    if (savedMissed.length > 0) {
        warningHtml = `
            <div style="background:#fff3e0; padding:15px; border-radius:12px; border:2px solid #ffb74d; margin-bottom:15px; max-width:600px; margin-left:auto; margin-right:auto;">
                <h3 style="color:#e67e22; margin:0 0 10px 0;">⚠️ Cậu có ${savedMissed.length} từ vựng hay quên!</h3>
                <button class="btn btn-orange" style="width:100%;" onclick="startVokabelQuiz('all', true)">🔄 Ôn tập ngay cho nhớ!</button>
            </div>
        `;
    }

    document.getElementById("message").innerHTML = "📝 Chọn chủ đề Từ vựng (Bản Nâng Cấp)";
    document.getElementById("buttons").innerHTML = warningHtml + `
        <div style="max-width:600px;margin:0 auto;text-align:left;">
            <p style="font-size:18px;color:#666;margin:10px 0 5px;">🏥 Từ vựng Chuyên ngành Y</p>
            <button class="btn btn-light" style="width:100%; text-align:left;" onclick="startVokabelQuiz('krankheiten')">🦠 Krankheiten (Mặt bệnh)</button>
            <button class="btn btn-light" style="width:100%; text-align:left;" onclick="startVokabelQuiz('diagnostik')">🩺 Diagnostik Instrumente</button>
            <button class="btn btn-light" style="width:100%; text-align:left;" onclick="startVokabelQuiz('verbandmaterial')">🩹 Verbandmaterial</button>
            
            <p style="font-size:18px;color:#666;margin:15px 0 5px;">🏠 Từ vựng Đời sống (Alltag)</p>
            <button class="btn btn-light" style="width:48%;" onclick="startVokabelQuiz('arbeit')">💼 Arbeit</button>
            <button class="btn btn-light" style="width:48%;" onclick="startVokabelQuiz('umwelt')">🌍 Umwelt</button>
        </div>
        <button class="btn btn-light" style="margin-top:20px;" onclick="showLessons()">⬅️ Menu</button>
    `;
}

function startVokabelQuiz(gruppe, isReview = false) {
    if (isReview) {
        quizWords = getSavedMissedWords();
    } else {
        quizWords = [...vokabelGruppen[gruppe].woerter];
    }
    
    // Đảo lộn danh sách từ
    quizWords.sort(() => Math.random() - 0.5);
    currentQuizIndex = 0;
    quizScore = 0;
    currentMissedWords = []; // Reset danh sách sai của lượt này
    
    showQuizQuestion();
}

function showQuizQuestion() {
    if (currentQuizIndex >= quizWords.length) {
        finishVokabelQuiz();
        return;
    }
    
    let w = quizWords[currentQuizIndex];
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = `
        <span style="font-size:16px;color:#666;">Quiz | Câu ${currentQuizIndex + 1}/${quizWords.length}</span><br><br>
        ${w.bild ? `<img src="${w.bild}" style="width:150px;height:150px;object-fit:contain;border-radius:12px;margin-bottom:15px;">` : ''}<br>
        <b style="font-size:24px; color:#2980b9;">${w.vi}</b>
        <p style="font-size:16px; color:#7f8c8d;">Từ này trong tiếng Đức là gì? (Nhớ gõ cả mạo từ der/die/das hoặc sich... nhé)</p>
    `;
    
    document.getElementById("buttons").innerHTML = `
        <div class="card" style="margin-top:0; text-align:center;">
            <input type="text" id="vokabelInput" placeholder="Ví dụ: das Asthma" autocomplete="off" onkeypress="if(event.key === 'Enter') checkVokabelAnswer()">
            <button class="btn btn-green" style="margin-top:15px; width:100%;" onclick="checkVokabelAnswer()">Kiểm tra</button>
        </div>
        <button class="btn btn-light" onclick="showVokabelHauptmenu()">🚪 Thoát Quiz</button>
    `;
    
    // Tự động focus vào ô nhập liệu
    setTimeout(() => document.getElementById("vokabelInput").focus(), 100);
}

function checkVokabelAnswer() {
    let input = document.getElementById("vokabelInput").value.trim().toLowerCase();
    let w = quizWords[currentQuizIndex];
    let correctAns = w.de.toLowerCase();
    
    let isCorrect = (input === correctAns);
    
    let feedbackArea = document.getElementById("feedback-area");
    let aiCorrection = document.getElementById("ai-correction");
    feedbackArea.style.display = "block";
    aiCorrection.style.display = "block";
    
    let savedMissed = getSavedMissedWords();
    
    if (isCorrect) {
        quizScore++;
        // Nếu trả lời đúng, xóa từ này khỏi danh sách hay quên (nếu có)
        savedMissed = savedMissed.filter(item => item.de !== w.de);
        
        aiCorrection.innerHTML = `
            <h3 style="color:#27ae60; margin:0;">✅ Chính xác!</h3>
            <p style="font-size:18px;"><b>${w.de}</b> = ${w.vi}</p>
            <button class="btn btn-blue" onclick="nextVokabelQuestion()">➡️ Tiếp tục</button>
        `;
    } else {
        // Nếu trả lời sai, thêm vào danh sách hay quên của lượt này
        currentMissedWords.push(w);
        // Cập nhật luôn vào localStorage nếu chưa có
        if (!savedMissed.find(item => item.de === w.de)) {
            savedMissed.push(w);
        }
        
        aiCorrection.innerHTML = `
            <h3 style="color:#c0392b; margin:0;">❌ Sai rồi Vịt ơi!</h3>
            <p style="font-size:18px;">Cậu gõ: <s>${input || "(trống)"}</s></p>
            <p style="font-size:20px; color:#27ae60;">Phải là: <b>${w.de}</b></p>
            <button class="btn btn-orange" onclick="nextVokabelQuestion()">➡️ Nhớ rồi, đi tiếp!</button>
        `;
    }
    
    // Lưu lại sổ tay
    saveMissedWords(savedMissed);
    
    // Ẩn nút kiểm tra để tránh bấm 2 lần
    document.getElementById("buttons").style.display = "none";
}

function nextVokabelQuestion() {
    document.getElementById("buttons").style.display = "block";
    currentQuizIndex++;
    showQuizQuestion();
}

function finishVokabelQuiz() {
    let percent = Math.round((quizScore / quizWords.length) * 100);
    document.getElementById("message").innerHTML = `<b>Kết quả Quiz! 🎉</b><br><br>${quizScore}/${quizWords.length} (${percent}%)`;
    
    let html = `<div class="card" style="text-align:center;">`;
    if (currentMissedWords.length > 0) {
        html += `<h3 style="color:#e74c3c;">Vịt gõ sai ${currentMissedWords.length} từ này:</h3><ul style="text-align:left;">`;
        currentMissedWords.forEach(w => {
            html += `<li><b>${w.de}</b> (${w.vi})</li>`;
        });
        html += `</ul><p style="color:#e67e22; font-style:italic;">Kapi đã ghi sổ thù vặt. Lần sau vào app Kapi sẽ bắt cậu trả bài lại! 🦫📝</p>`;
    } else {
        html += `<h3 style="color:#2ecc71;">Tuyệt vời! Vịt không sai từ nào luôn!</h3>`;
    }
    html += `</div>`;
    
    document.getElementById("feedback-area").style.display = "block";
    document.getElementById("ai-correction").style.display = "none";
    document.getElementById("transcript-text").innerHTML = html;
    
    document.getElementById("buttons").innerHTML = `
        <button class="btn btn-light" onclick="showVokabelHauptmenu()">⬅️ Menu Từ Vựng</button>
    `;
}
</script>
