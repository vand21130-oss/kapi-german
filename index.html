    <p id="transcript-text" style="font-size:20px;"><i>Dein Text erscheint hier...</i></p>
    <div id="ai-correction" style="display:none;margin-top:15px;border-top:1px solid #ccc;padding-top:15px;"></div>
</div>

</div>

<script>
let currentTeil = "";
let currentLevel = "";
let countdown;
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording() {
    let recordBtn = document.getElementById("record-btn");
    let feedbackArea = document.getElementById("feedback-area");
    let aiCorrection = document.getElementById("ai-correction");

    if (!isRecording) {
        audioChunks = [];
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        isRecording = true;
        recordBtn.innerHTML = "🛑 Stopp";
        feedbackArea.style.display = "block";
        aiCorrection.style.display = "none";
        document.getElementById("transcript-text").innerHTML = "<i>Kapi hört zu... 🦫🎤</i>";
    } else {
        mediaRecorder.stop();
        isRecording = false;
        recordBtn.innerHTML = "🎤 Aufnehmen";
        document.getElementById("transcript-text").innerHTML = "<i>Kapi denkt nach... 🧠</i>";

        mediaRecorder.onstop = async () => {
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'audio.webm');

            aiCorrection.innerHTML = "<p style='color:#0984e3;'><i>Kapi đang nghe và suy nghĩ... 🧠🦫</i></p>";
            aiCorrection.style.display = "block";

            try {
                const transcribeRes = await fetch('/api/transcribe', {
                    method: 'POST',
                    body: formData
                });
                const transcribeData = await transcribeRes.json();
                const text = transcribeData.text;

                if (!text || !text.trim()) {
                    document.getElementById("transcript-text").innerHTML = "<b>Oops!</b>";
                    aiCorrection.innerHTML = "<p style='color:red;'>Ich habe nichts gehört. (Kapi chưa nghe thấy gì)</p>";
                    return;
                }

                document.getElementById("transcript-text").innerHTML = "<b>Du sagst:</b> " + text;

                const chatRes = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const chatData = await chatRes.json();
                if (chatData.result) {
                    aiCorrection.innerHTML = chatData.result;
                } else {
                    aiCorrection.innerHTML = "<p style='color:red;'>" + (chatData.error || "Lỗi không xác định") + "</p>";
                }
            } catch (error) {
                aiCorrection.innerHTML = "<p style='color:red;'>Lỗi: " + error.message + "</p>";
            }
        };
    }
}

// ===== LEVEL =====
function showLevels() {
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerText = "Welches Niveau möchtest du heute üben? 📚";
    document.getElementById("buttons").innerHTML = `
        <button onclick="chooseLevel('A1')" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;">📗 A1</button>
        <button onclick="chooseLevel('A2')" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;">📘 A2</button>
        <button onclick="chooseLevel('B1')" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;">📒 B1</button>
        <button onclick="chooseLevel('B2')" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;">📙 B2</button>
    `;
}

function chooseLevel(level) {
    currentLevel = level;
    document.getElementById("message").innerText = "Super! Heute üben wir Deutsch auf Niveau " + level + " 🇩🇪";
    showLessons();
}
