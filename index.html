<!DOCTYPE html>
<html>

<body
style="
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:white;
">

<h1>Hallo! Ich bin Kapi 🦫</h1>

<img src="capy.png" width="450">

<p id="message" style="font-size:30px;">
Guten Morgen! Schön, dich kennenzulernen! 🌟
</p>

<div id="buttons">

<button
style="
font-size:24px;
padding:12px 24px;
border-radius:12px;
cursor:pointer;
"
onclick="sayHallo()">
👋 Hallo Kapi
</button>

</div>

<script>

function sayHallo() {

    document.getElementById("message").innerText =
        "Hallo! Wie geht's dir? 😊";

    document.getElementById("buttons").innerHTML = `
        <button
        onclick="goodAnswer()"
        style="
        font-size:22px;
        padding:15px 25px;
        margin:10px;
        border-radius:20px;
        border:none;
        cursor:pointer;
        ">
            😊 Mir geht's gut!
        </button>

        <button
        onclick="badAnswer()"
        style="
        font-size:22px;
        padding:15px 25px;
        margin:10px;
        border-radius:20px;
        border:none;
        cursor:pointer;
        ">
            😢 Nicht so gut.
        </button>
    `;
}

function goodAnswer() {

    document.getElementById("message").innerText =
        "Das freut mich! 🌟\n\nWas möchtest du heute lernen?";

    showLessonButtons();
}

function badAnswer() {

    document.getElementById("message").innerText =
        "Oh nein! Hoffentlich wird dein Tag besser. 💛\n\nWas möchtest du heute lernen?";

    showLessonButtons();
}
