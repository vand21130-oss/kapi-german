<!DOCTYPE html>
<html>

<body
style="
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:white;
">

<h1>Hallo! Ich bin Kapi 🦫</h1>

<img src="capy.png" width="450">

<p id="message" style="font-size:30px;">
Guten Morgen! Schön, dich kennenzulernen! 🌟
</p>

<button
style="
font-size:24px;
padding:12px 24px;
border-radius:12px;
cursor:pointer;
"
onclick="sayHallo()">
👋 Hallo Kapi
</button>

<script>
function sayHallo() {
    document.getElementById("message").innerText =
        "Hallo! Wie geht's dir? 😊";
}
</script>

</body>
</html>
