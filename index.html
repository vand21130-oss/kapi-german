let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording() {
    let recordBtn = document.getElementById("record-btn");
    let feedbackArea = document.getElementById("feedback-area");
    let aiCorrection = document.getElementById("ai-correction");

    if (!isRecording) {
        audioChunks = [];
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        isRecording = true;
        recordBtn.innerHTML = "🛑 Stopp";
        feedbackArea.style.display = "block";
        aiCorrection.style.display = "none";
        document.getElementById("transcript-text").innerHTML = "<i>Kapi hört zu... 🦫🎤</i>";
    } else {
        mediaRecorder.stop();
        isRecording = false;
        recordBtn.innerHTML = "🎤 Aufnehmen";
        document.getElementById("transcript-text").innerHTML = "<i>Kapi denkt nach... 🧠</i>";

        mediaRecorder.onstop = async () => {
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'audio.webm');

            aiCorrection.innerHTML = "<p style='color:#0984e3;'><i>Kapi đang nghe và suy nghĩ... 🧠🦫</i></p>";
            aiCorrection.style.display = "block";

            try {
                const transcribeRes = await fetch('/api/transcribe', {
                    method: 'POST',
                    body: formData
                });
                const transcribeData = await transcribeRes.json();
                const text = transcribeData.text;

                if (!text || !text.trim()) {
                    document.getElementById("transcript-text").innerHTML = "<b>Oops!</b>";
                    aiCorrection.innerHTML = "<p style='color:red;'>Ich habe nichts gehört. (Kapi chưa nghe thấy gì)</p>";
                    return;
                }

                document.getElementById("transcript-text").innerHTML = "<b>Du sagst:</b> " + text;

                const chatRes = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const chatData = await chatRes.json();
                if (chatData.result) {
                    aiCorrection.innerHTML = chatData.result;
                } else {
                    aiCorrection.innerHTML = "<p style='color:red;'>" + (chatData.error || "Lỗi không xác định") + "</p>";
                }
            } catch (error) {
                aiCorrection.innerHTML = "<p style='color:red;'>Lỗi: " + error.message + "</p>";
            }
        };
    }
}

function startTimer() {
    clearInterval(countdown);
    let time = 120;
    countdown = setInterval(function() {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        document.getElementById("timer").innerText = minutes + ":" + seconds.toString().padStart(2, "0");
        time--;
        if (time < 0) {
            clearInterval(countdown);
            document.getElementById("timer").innerText = "⏰ Zeit ist um!";
        }
    }, 1000);
}

let currentQuestionIndex = 0;
let score = 0;
let shuffledQuestions = [];

function showLesenMenu() {
    document.getElementById("feedback-area").style.display = "none";
    document.getElementById("message").innerHTML = "Wähle ein Thema! 📖";
    document.getElementById("buttons").innerHTML = `
        <button onclick="startMedizin()" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#e8f5e9;">🏥 Medizinische Fachbegriffe</button>
        <button onclick="showLessons()" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;">🦫 Zurück</button>
    `;
}

function startMedizin() {
    score = 0;
    currentQuestionIndex = 0;
    shuffledQuestions = [...medizinQuestions].sort(() => Math.random() - 0.5);
    showQuestion();
}

function showQuestion() {
    if (currentQuestionIndex >= shuffledQuestions.length) {
        showResult();
        return;
    }

    const q = shuffledQuestions[currentQuestionIndex];
    const typeLabel = q.type === "luecke" ? "🔤 Điền vào chỗ trống" : q.type === "bedeutung" ? "📚 Chọn nghĩa đúng" : "✏️ Chọn từ đúng";

    document.getElementById("message").innerHTML = `
        <span style="font-size:16px;color:#666;">${typeLabel} | Câu ${currentQuestionIndex + 1}/${shuffledQuestions.length} | Điểm: ${score}</span><br><br>
        <b>${q.frage}</b>
    `;

    const shuffledAnswers = q.antworten.map((a, i) => ({text: a, original: i})).sort(() => Math.random() - 0.5);
    const labels = ["A", "B", "C", "D"];

    document.getElementById("buttons").innerHTML = shuffledAnswers.map((a, i) => `
        <button onclick="checkAnswer(${a.original}, ${q.richtig}, '${encodeURIComponent(q.erklaerung)}')" style="
            font-size:18px;
            padding:12px 20px;
            margin:8px;
            border-radius:15px;
            border:2px solid #ddd;
            cursor:pointer;
            display:block;
            width:90%;
            max-width:600px;
            text-align:left;
        ">
            <b>${labels[i]}.</b> ${a.text}
        </button>
    `).join('');
}

function checkAnswer(chosen, correct, erklaerungEncoded) {
    const erklaerung = decodeURIComponent(erklaerungEncoded);
    const isCorrect = chosen === correct;
    if (isCorrect) score++;

    const feedbackArea = document.getElementById("feedback-area");
    const aiCorrection = document.getElementById("ai-correction");
    feedbackArea.style.display = "block";
    aiCorrection.style.display = "block";
    aiCorrection.innerHTML = `
        <p style="font-size:22px;">${isCorrect ? "✅ Richtig! / Đúng rồi!" : "❌ Falsch! / Sai rồi!"}</p>
        <p style="font-size:16px;">${erklaerung}</p>
        <button onclick="nextQuestion()" style="font-size:20px;padding:10px 25px;border-radius:15px;border:none;cursor:pointer;background:#4CAF50;color:white;margin-top:10px;">
            ${currentQuestionIndex + 1 >= shuffledQuestions.length ? "🏆 Ergebnis sehen" : "➡️ Nächste Frage"}
        </button>
    `;
}

function nextQuestion() {
    currentQuestionIndex++;
    document.getElementById("feedback-area").style.display = "none";
    showQuestion();
}

function showResult() {
    const percent = Math.round((score / shuffledQuestions.length) * 100);
    const emoji = percent >= 80 ? "🏆" : percent >= 60 ? "👍" : "💪";
    document.getElementById("message").innerHTML = `
        ${emoji} <b>Ergebnis / Kết quả</b><br><br>
        ${score}/${shuffledQuestions.length} Punkte (${percent}%)<br><br>
        ${percent >= 80 ? "Ausgezeichnet! Sehr gut gemacht! 🌟" : percent >= 60 ? "Gut gemacht! Weiter so! 👏" : "Nicht aufgeben! Übung macht den Meister! 💪"}
    `;
    document.getElementById("buttons").innerHTML = `
        <button onclick="startMedizin()" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;background:#e8f5e9;">🔄 Nochmal / Thử lại</button>
        <button onclick="showLesenMenu()" style="font-size:22px;padding:15px 25px;margin:10px;border-radius:20px;border:none;cursor:pointer;">📖 Zurück</button>
    `;
    document.getElementById("feedback-area").style.display = "none";
}
