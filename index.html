<!DOCTYPE html>
<html>

<body
style="
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:#f5f5f5;
font-family:sans-serif;
">

<h1>Hallo! Ich bin Kapi 🦫</h1>

<img src="capy.png" width="300">

<p id="message" style="font-size:30px;">
Guten Morgen! Schön, dich kennenzulernen! 🌟
</p>

<div id="buttons">

<button
onclick="sayHallo()"
style="
font-size:24px;
padding:12px 24px;
border:none;
border-radius:15px;
cursor:pointer;
">
👋 Hallo Kapi
</button>

</div>

<script>

function sayHallo() {

    document.getElementById("message").innerText =
        "Hallo! Wie geht's dir? 😊";

    document.getElementById("buttons").innerHTML = `

        <button
        onclick="goodAnswer()"
        style="
        font-size:22px;
        padding:15px 25px;
        margin:10px;
        border:none;
        border-radius:15px;
        cursor:pointer;
        ">
        😊 Mir geht's gut!
        </button>

        <button
        onclick="badAnswer()"
        style="
        font-size:22px;
        padding:15px 25px;
        margin:10px;
        border:none;
        border-radius:15px;
        cursor:pointer;
        ">
        😢 Nicht so gut.
        </button>

    `;
}

function goodAnswer() {

    document.getElementById("message").innerText =
        "Das freut mich! 🌟\n\nWas möchtest du heute lernen?";

    showLessons();
}

function badAnswer() {

    document.getElementById("message").innerText =
        "Oh nein! Hoffentlich wird dein Tag besser. 💛\n\nWas möchtest du heute lernen?";

    showLessons();
}

function showLessons() {

    document.getElementById("buttons").innerHTML = `

        <button onclick="chooseLesson('Hören')" class="lesson">
        👂 Hören
        </button>

        <button onclick="chooseLesson('Sprechen')" class="lesson">
        🗣️ Sprechen
        </button>

        <button onclick="chooseLesson('Lesen')" class="lesson">
        📖 Lesen
        </button>

        <button onclick="chooseLesson('Schreiben')" class="lesson">
        ✍️ Schreiben
        </button>

    `;
}

function chooseLesson(lesson) {

    document.getElementById("message").innerText =
        "Super! Heute lernen wir " + lesson + " 🎉";

    document.getElementById("buttons").innerHTML = `

        <button
        onclick="restart()"
        style="
        font-size:22px;
        padding:15px 25px;
        margin-top:20px;
        border:none;
        border-radius:15px;
        cursor:pointer;
        ">
        🔄 Zurück zu Kapi
        </button>

    `;
}

function restart() {

    document.getElementById("message").innerText =
        "Guten Morgen! Schön, dich kennenzulernen! 🌟";

    document.getElementById("buttons").innerHTML = `

        <button
        onclick="sayHallo()"
        style="
        font-size:24px;
        padding:12px 24px;
        border:none;
        border-radius:15px;
        cursor:pointer;
        ">
        👋 Hallo Kapi
        </button>

    `;
}

</script>

</body>
</html>
